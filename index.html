<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>POD Network — Office Readiness Assessment</title>
  <style>
    :root {
      --bg: #faf8f5; /* Cream background */
      --card-bg: #eff5f4; /* Soft mint card background from screenshot */
      --option-bg: #ffffff; /* Crisp white for standard options */
      --line: #e3ded6;
      --text: #1a1a1a;
      --text-soft: #636b69;
      --gold: #b09c81;
      --teal: #405e5b;
      --shadow: 0 4px 12px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 30px 16px 60px;
    }

    .shell {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header & Branding */
    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 8px;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0 0 12px 0;
      color: #111;
    }

    .sub {
      font-size: 15px;
      line-height: 1.5;
      color: var(--text-soft);
      margin: 0 0 24px 0;
    }

    /* Progress Tracker */
    .progress-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #d8cec1;
      transition: background-color 0.2s;
    }

    .dot.filled {
      background-color: #a3937e;
    }

    .dot-count {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-soft);
    }

    /* Input Field */
    .office-input {
      width: 100%;
      background-color: #f7f3ed;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      margin-bottom: 30px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .office-input:focus {
      border-color: var(--gold);
    }

    .office-input::placeholder {
      color: #a89d91;
    }

    /* Question Cards */
    .card {
      background-color: var(--card-bg);
      border: 1px solid #dbe6e4;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    .q-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .q-badge {
      background-color: var(--teal);
      color: white;
      min-width: 36px;
      height: 24px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .q-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
      color: #1a1e1d;
    }

    .q-desc {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-soft);
      margin-bottom: 16px;
      margin-left: 48px; /* Lines up with title text */
    }

    /* Side Sidebar Guide */
    .guide {
      border-left: 3px solid var(--teal);
      padding-left: 14px;
      margin-left: 48px;
      font-size: 14px;
      line-height: 1.5;
      color: #4a4a4a;
      margin-bottom: 24px;
    }

    .guide strong {
      color: var(--teal);
    }

    /* Options Stack */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-left: 48px;
    }

    .option {
      background-color: var(--option-bg);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }

    .option:hover {
      border-color: #bca98f;
    }

    .option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .option-num {
      min-width: 26px;
      height: 26px;
      border-radius: 50%;
      background-color: #efede8;
      color: var(--text-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .option-text {
      font-size: 14px;
      font-weight: 500;
      color: #333333;
      line-height: 1.4;
    }

    /* Selection State styling */
    .option.selected {
      border-color: var(--gold);
      background-color: #fdfaf5;
      box-shadow: 0 4px 12px rgba(176,156,129,0.1);
    }

    .option.selected .option-num {
      background-color: var(--gold);
      color: white;
    }

    /* Meter / Slider Display */
    .meter {
      height: 6px;
      background-color: #e2d9cf;
      border-radius: 10px;
      margin-top: 20px;
      margin-left: 48px;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      background-color: var(--gold);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Notes Area */
    .notes-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #a19586;
      margin-top: 18px;
      margin-left: 48px;
      margin-bottom: 6px;
    }

    textarea.notes {
      width: calc(100% - 48px);
      margin-left: 48px;
      min-height: 80px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      background-color: #ffffff;
      transition: border-color 0.2s;
    }

    textarea.notes:focus {
      border-color: var(--gold);
    }

    /* Result Actions */
    .reveal-box {
      margin-top: 30px;
      display: none;
      text-align: center;
    }

    .reveal-box.show {
      display: block;
    }

    .reveal-btn {
      width: 100%;
      padding: 16px;
      background-color: var(--teal);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }

    .reveal-btn:hover {
      transform: translateY(-2px);
    }

    /* Final Scoring Styles */
    .results-area {
      display: none;
      margin-top: 30px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .results-area.show {
      display: block;
    }

    .results-top {
      padding: 30px;
      text-align: center;
      background-color: #eff5f4; /* Same mint for continuity */
    }

    .res-grade {
      font-family: Georgia, serif;
      font-size: 72px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .res-tier {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .res-body {
      padding: 24px;
    }

    .reset-btn {
      margin-top: 20px;
      padding: 12px 24px;
      border-radius: 10px;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--gold);
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 13px;
    }

    /* Adjust margins for smaller phones */
    @media (max-width: 600px) {
      .q-desc, .guide, .options, textarea.notes, .meter, .notes-label {
        margin-left: 0;
        width: 100%;
      }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>

  <div class="shell">
    <div class="eyebrow">POD Network</div>
    <h1>Office Readiness Assessment</h1>
    <p class="sub">Answer based on what exists right now — not projections, not future plans.</p>

    <div class="progress-bar">
      <div id="dots" class="dots"></div>
      <span id="dotCount" class="dot-count">0/10</span>
    </div>

    <input id="officeName" class="office-input" type="text" placeholder="Your name or team name (e.g. Sarah M. — solo agent, Scottsdale)" />

    <div id="surveyContainer"></div>

    <div id="revealBox" class="reveal-box">
      <button class="reveal-btn" id="revealBtn">Reveal Assessment Result</button>
    </div>

    <div id="resultsArea" class="results-area"></div>
  </div>

  <script>
    const CLASSIFIERS = [
      {
        id: "role",
        label: "What best describes your role?",
        desc: "This determines how your results are interpreted and which program tier applies to you.",
        guidance: "Select the option that describes you today — not what you're working toward.",
        options: [
          { value: "referral", label: "EXP Commercial referral agent / classified referral division" },
          { value: "solo", label: "Solo agent — independent, no team" },
          { value: "team", label: "Agent on a team" },
          { value: "leader", label: "Team leader or mega team operator" }
        ]
      },
      {
        id: "txcount",
        label: "How many transactions did you close in the last 12 months?",
        desc: "Individual or team total — whichever reflects your actual production.",
        guidance: "<strong>Real numbers from the last 12 months.</strong> If you're a team leader, include your full team's transaction count.",
        options: [
          { value: "tx1", label: "10–20 transactions" },
          { value: "tx2", label: "20–30 transactions" },
          { value: "tx3", label: "30–50 transactions" },
          { value: "tx4", label: "50–100 transactions" },
          { value: "tx5", label: "100–150 transactions" },
          { value: "tx6", label: "150–200 transactions" },
          { value: "tx7", label: "200+ transactions" }
        ]
      }
    ];

    const VARIABLES = [
      {
        id: "volume",
        label: "Team Production Volume",
        weight: 20,
        maxScore: 6,
        desc: "Total transaction volume closed in the last 12 months — team or individual, whichever is higher.",
        guidance: "<strong>Real numbers only.</strong> What did you actually close in the last 12 months?",
        notesPrompt: "Exact volume last 12 months + per-agent average if known",
        options: ["$5M – $25M total volume", "$25M – $50M total volume", "$50M – $100M total volume", "$100M – $150M total volume", "$150M – $200M total volume", "$200M+ total volume"]
      },
      {
        id: "capicon",
        label: "Agent Cap & Icon Rate",
        weight: 15,
        maxScore: 5,
        desc: "How many agents on your team capped or iconed last year.",
        guidance: "<strong>Think ratio, not total.</strong> 100 agents / 5 icons is very different from 50 agents / 40 icons.",
        notesPrompt: "Total agents / agents capped / agents iconed",
        options: ["Less than 20% capped last year", "20–40% capped, minimal icons", "40–70% capped, some icons", "70–90% capped, 10–25% iconed", "90%+ capped, 25%+ iconed"]
      },
      {
        id: "wealth",
        label: "Geographic Proximity to Wealth",
        weight: 15,
        maxScore: 5,
        desc: "Where your office sits relative to high-net-worth residential and commercial corridors.",
        guidance: "How far from where wealth lives, works, and transacts?",
        notesPrompt: "Primary zip codes your agents work in",
        options: ["Remote — no proximate wealth concentration", "Adjacent to modest wealth corridors (20+ min)", "Near established middle-market commercial zones", "Within high-wealth residential and commercial corridor", "Embedded in primary luxury hub"]
      },
      {
        id: "engagement",
        label: "Team Leader Engagement & Commitment",
        weight: 20,
        maxScore: 5,
        desc: "The leader's demonstrated willingness to actively champion and sustain the program.",
        guidance: "<strong>Score observed behavior, not stated interest.</strong> Passive interest is not commitment.",
        notesPrompt: "Describe current engagement with commercial initiatives",
        options: ["Passive / skeptical", "Curious but uncommitted", "Supportive — will participate", "Committed — promotes, attends training", "Champion — fully bought in"]
      },
      {
        id: "crm",
        label: "Business Owner CRM Relationships",
        weight: 15,
        maxScore: 5,
        desc: "Relationships with business owners who make real estate decisions.",
        guidance: "Who in your database owns or operates a business?",
        notesPrompt: "Name significant business owners in database",
        options: ["Know a single small business owner", "Know multiple small business owners", "Know a C-suite exec, founder, or mid-size org leader", "Know a multi-location operator (5–20 locations)", "Know an enterprise-level decision maker (20+ locations)"]
      },
      {
        id: "investor",
        label: "Institutional Investor & Landlord Portfolio Relationships",
        weight: 10,
        maxScore: 5,
        desc: "Relationships with portfolio owners — people who own multiple properties at scale.",
        guidance: "Who has called you about more than one property?",
        notesPrompt: "List your top portfolio owners or landlords by name",
        options: ["No known portfolio owners in CRM", "A handful of casual investors (1–2 properties each)", "Moderate base — some multi-property owners", "Strong relationships — active landlords", "Deep network — serious portfolio owners"]
      },
      {
        id: "velocity",
        label: "Local Commercial Transaction Velocity",
        weight: 3,
        maxScore: 5,
        desc: "How active the commercial market is in this territory right now.",
        guidance: "Are commercial deals happening here regardless of who is doing them?",
        notesPrompt: "Awareness of recent commercial activity?",
        options: ["Very low velocity", "Low velocity", "Moderate velocity", "Active", "High velocity"]
      },
      {
        id: "access",
        label: "Market Territory Accessibility",
        weight: 2,
        maxScore: 5,
        desc: "Physical accessibility of the office and territory to commercial clients.",
        guidance: "Would a commercial client find it easy to meet here?",
        notesPrompt: "Geographic limitations worth noting?",
        options: ["Difficult access", "Somewhat accessible but off-strip", "Reasonably accessible", "Well-positioned (near transit / freeways)", "Prime location (high visibility)"]
      }
    ];

    const state = {
      classifierAnswers: {},
      scores: {},
      notes: {}
    };

    // --- INIT APP RENDER ---
    function initApp() {
      const container = document.getElementById("surveyContainer");
      let html = "";

      CLASSIFIERS.forEach((c, i) => {
        html += `
          <div class="card" data-qid="${c.id}" data-type="classifier">
            <div class="q-header">
              <span class="q-badge">Q${i + 1}</span>
              <div class="q-title">${c.label}</div>
            </div>
            <div class="q-desc">${c.desc}</div>
            <div class="guide">${c.guidance}</div>
            <div class="options">
              ${c.options.map((opt, optIdx) => `
                <label class="option" data-role="option">
                  <input type="radio" name="${c.id}" value="${opt.value}" data-qid="${c.id}" data-action="classifier-radio">
                  <span class="option-num">${optIdx + 1}</span>
                  <span class="option-text">${opt.label}</span>
                </label>
              `).join('')}
            </div>
          </div>
        `;
      });

      VARIABLES.forEach((v, i) => {
        const qNum = CLASSIFIERS.length + i + 1;
        html += `
          <div class="card" data-qid="${v.id}" data-type="variable">
            <div class="q-header">
              <span class="q-badge">Q${qNum}</span>
              <div class="q-title">${v.label}</div>
            </div>
            <div class="q-desc">${v.desc}</div>
            <div class="guide">${v.guidance}</div>
            <div class="options">
              ${v.options.map((opt, optIdx) => `
                <label class="option" data-role="option">
                  <input type="radio" name="${v.id}" value="${optIdx + 1}" data-qid="${v.id}" data-action="score-radio">
                  <span class="option-num">${optIdx + 1}</span>
                  <span class="option-text">${opt}</span>
                </label>
              `).join('')}
            </div>
            <div class="meter"><div class="meter-fill" data-target="meter-fill"></div></div>
            <div class="notes-label">Field Notes</div>
            <textarea class="notes" data-action="note-blur" data-id="${v.id}" placeholder="${v.notesPrompt}"></textarea>
          </div>
        `;
      });

      container.innerHTML = html;
      wireEvents();
      updateUI();
    }

    // --- CLICK EVENT LISTENERS ---
    function wireEvents() {
      document.getElementById("surveyContainer").addEventListener("change", (e) => {
        const action = e.target.dataset.action;
        const qid = e.target.dataset.qid;

        if (!action) return;

        if (action === "classifier-radio") {
          state.classifierAnswers[qid] = e.target.value;
          
          const parentCard = e.target.closest(".card");
          parentCard.querySelectorAll('[data-role="option"]').forEach(lbl => lbl.classList.remove("selected"));
          e.target.closest(".option").classList.add("selected");
          updateUI();
        }

        if (action === "score-radio") {
          state.scores[qid] = Number(e.target.value);

          const parentCard = e.target.closest(".card");
          parentCard.querySelectorAll('[data-role="option"]').forEach(lbl => lbl.classList.remove("selected"));
          e.target.closest(".option").classList.add("selected");
          updateUI();
        }
      });

      document.getElementById("surveyContainer").addEventListener("blur", (e) => {
        if (e.target.dataset.action === "note-blur") {
          state.notes[e.target.dataset.id] = e.target.value;
        }
      }, true);
    }

    // --- DYNAMIC INTERFACE PAINTER ---
    function updateUI() {
      const elDots = document.getElementById("dots");
      const cAnswered = Object.keys(state.classifierAnswers).length;
      const vAnswered = Object.keys(state.scores).length;
      const totalCount = CLASSIFIERS.length + VARIABLES.length;

      let dotsHtml = CLASSIFIERS.map(c => `<div class="dot ${state.classifierAnswers[c.id] ? 'filled' : ''}"></div>`).join('');
      dotsHtml += VARIABLES.map(v => `<div class="dot ${state.scores[v.id] ? 'filled' : ''}"></div>`).join('');
      elDots.innerHTML = dotsHtml;

      document.getElementById("dotCount").innerText = `${cAnswered + vAnswered}/${totalCount}`;

      // Update Sliding Fill Metric
      document.querySelectorAll('[data-type="variable"]').forEach(card => {
        const qid = card.dataset.qid;
        const fill = card.querySelector('[data-target="meter-fill"]');
        const rawScore = state.scores[qid] || 0;
        const maxScore = VARIABLES.find(v => v.id === qid).maxScore;

        fill.style.width = rawScore ? `${(rawScore / maxScore) * 100}%` : '0%';
      });

      // Show Results Reveal button once all answered
      const allDone = (cAnswered === CLASSIFIERS.length) && (vAnswered === VARIABLES.length);
      if (allDone) {
        document.getElementById("revealBox").classList.add("show");
      }
    }

    // --- CALC FINAL GRADE ENGINE ---
    function getWeightedScore() {
      return VARIABLES.reduce((acc, v) => {
        const raw = state.scores[v.id];
        if (!raw) return acc;
        return acc + (raw / v.maxScore) * v.weight;
      }, 0);
    }

    function calculateTier(score, role) {
      if (role === "referral") return { grade: "T1", tier: "Tier 1 Referral Program" };
      if (score >= 90) return { grade: "A+", tier: "Tier 3 — High Activation Scale" };
      if (score >= 82) return { grade: "A", tier: "Tier 3 — Deployment Prep" };
      if (score >= 72) return { grade: "B+", tier: "Tier 2 — Embedded Business Units" };
      if (score >= 58) return { grade: "B", tier: "Tier 1 Signal Tracking" };
      return { grade: "C", tier: "Baseline Metric Readiness" };
    }

    // --- REVEAL SUBMISSION AND REPORT ---
    document.getElementById("revealBtn").addEventListener("click", () => {
      const finalScore = getWeightedScore();
      const role = state.classifierAnswers['role'];
      const meta = calculateTier(finalScore, role);
      const name = document.getElementById("officeName").value.trim() || "Assessment Overview";

      const reportBox = document.getElementById("resultsArea");

      reportBox.innerHTML = `
        <div class="results-top">
          <div style="font-size: 11px; text-transform:uppercase; letter-spacing: 0.15em; font-weight: 700; opacity: 0.7">${name}</div>
          <div class="res-grade">${meta.grade}</div>
          <div class="res-tier">${meta.tier}</div>
          <div style="font-size: 15px; color: #555;">Calculated Raw Metric Total: <strong>${finalScore.toFixed(1)}</strong> of 100.0%</div>
        </div>
        <div class="res-body">
          <p style="margin-bottom: 24px; font-size: 14px; color: #4a4a4a; line-height:1.5;">Your structural office analysis metrics are securely computed and saved. Contact network ops to retrieve exact record integrations.</p>
          <button class="reset-btn" id="resetBtn">Run New Assessment</button>
        </div>
      `;

      reportBox.classList.add("show");
      reportBox.scrollIntoView({ behavior: 'smooth' });

      document.getElementById("resetBtn").addEventListener("click", () => {
        state.classifierAnswers = {};
        state.scores = {};
        state.notes = {};
        document.getElementById("officeName").value = "";
        document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        document.querySelectorAll('textarea').forEach(t => t.value = "");
        document.querySelectorAll('.option').forEach(o => o.classList.remove("selected"));
        document.getElementById("resultsArea").classList.remove("show");
        document.getElementById("revealBox").classList.remove("show");
        updateUI();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    initApp();
  </script>
</body>
</html>
