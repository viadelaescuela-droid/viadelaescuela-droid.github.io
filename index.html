<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POD Network — Office Readiness Assessment</title>
  <style>
    :root{
      --bg:#f6f2ec;
      --surface:#fdfaf7;
      --surface-2:#efe8df;
      --line:#d8cec1;
      --text:#2e2418;
      --text-soft:#786a59;
      --text-faint:#a3937e;
      --gold:#8b7355;
      --gold-soft:#e9ddcd;
      --green:#4a6741;
      --green-bg:#e8efe7;
      --blue:#3d5a6b;
      --blue-bg:#e5edf2;
      --accent:#355f5a;
      --accent-bg:#e4efed;
      --shadow:0 10px 30px rgba(44,36,22,.08);
      --radius:18px;
      --radius-sm:12px;
    }

    * { box-sizing:border-box; }
    html, body { margin:0; padding:0; }
    body{
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.65), transparent 35%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      padding-bottom:48px;
    }

    .shell{
      max-width:820px;
      margin:0 auto;
      padding:20px 16px 40px;
    }

    .hero{
      position:sticky;
      top:0;
      z-index:20;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background:rgba(246,242,236,.88);
      border-bottom:1px solid rgba(216,206,193,.8);
      margin:0 -16px 18px;
      padding:18px 16px 16px;
    }

    .hero-inner{
      max-width:820px;
      margin:0 auto;
    }

    .eyebrow{
      font-size:12px;
      letter-spacing:.38em;
      text-transform:uppercase;
      color:var(--gold);
      margin-bottom:10px;
    }

    h1{
      margin:0;
      font-family: Georgia, "Times New Roman", serif;
      font-size:clamp(2rem, 5vw, 3.4rem);
      line-height:.96;
      letter-spacing:-.03em;
      color:var(--text);
    }

    .sub{
      margin-top:10px;
      color:var(--text-soft);
      font-size:clamp(15px, 2.9vw, 18px);
      line-height:1.45;
      max-width:680px;
    }

    .topbar{
      display:flex;
      gap:14px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .name-wrap{
      flex:1 1 420px;
    }

    .office-input{
      width:100%;
      border:1px solid var(--line);
      background:rgba(255,255,255,.55);
      color:var(--text);
      border-radius:16px;
      padding:16px 18px;
      font-size:17px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
      outline:none;
    }

    .office-input::placeholder{ color:#b09f8a; }

    .progress-box{
      min-width:180px;
      background:rgba(255,255,255,.55);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      box-shadow: var(--shadow);
    }

    .progress-label{
      font-size:11px;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:var(--text-faint);
      margin-bottom:8px;
    }

    .dots{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      align-items:center;
    }

    .dot{
      width:9px;
      height:9px;
      border-radius:999px;
      background:#d8cec1;
    }

    .dot.filled{ background:var(--gold); }
    .dot.classifier.filled{ background:var(--accent); }

    .dot-count{
      margin-left:6px;
      font-size:12px;
      color:var(--text-soft);
      font-weight:600;
    }

    .route{
      display:none;
      margin:8px 0 18px;
      border-radius:16px;
      padding:14px 16px;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      font-size:14px;
      line-height:1.5;
    }
    .route.show{ display:block; }
    .route.referral{ background:#fff9f1; color:#7a4f2e; }
    .route.solo{ background:var(--blue-bg); color:var(--blue); }
    .route.team{ background:var(--green-bg); color:var(--green); }
    .route.leader{ background:var(--gold-soft); color:var(--gold); }

    .card{
      background:rgba(253,250,247,.92);
      border:1px solid rgba(216,206,193,.95);
      border-radius:22px;
      padding:18px;
      margin-bottom:14px;
      box-shadow:var(--shadow);
    }

    .card.classifier-card{
      background:linear-gradient(180deg, rgba(228,239,237,.9), rgba(253,250,247,.92));
      border-color:rgba(53,95,90,.18);
    }

    .card-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:12px;
    }

    .q-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:44px;
      height:24px;
      border-radius:999px;
      background:var(--gold);
      color:white;
      font-size:11px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-right:8px;
      vertical-align:middle;
    }

    .q-badge.classifier{ background:var(--accent); }

    .weight{
      display:inline-block;
      margin-left:8px;
      border:1px solid var(--accent);
      color:var(--accent);
      background:var(--accent-bg);
      border-radius:999px;
      padding:4px 8px;
      font-size:11px;
      font-weight:700;
    }

    .title{
      font-size:19px;
      line-height:1.2;
      font-weight:700;
      color:var(--text);
    }

    .desc{
      margin-top:6px;
      color:var(--text-soft);
      font-size:14px;
      line-height:1.45;
    }

    .score-pill{
      min-width:42px;
      height:42px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:18px;
      background:var(--gold-soft);
      color:var(--gold);
      flex-shrink:0;
    }
    .score-pill.acc{
      background:var(--accent-bg);
      color:var(--accent);
    }

    .guide{
      border-left:4px solid var(--accent);
      background:var(--accent-bg);
      color:var(--text-soft);
      padding:12px 14px;
      border-radius:0 14px 14px 0;
      margin-bottom:12px;
      font-size:14px;
      line-height:1.5;
    }

    .guide strong{ color:var(--accent); }

    .options{
      display:grid;
      gap:8px;
    }

    .option{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      background:#fbf8f4;
      color:var(--text);
      border-radius:16px;
      padding:14px;
      display:flex;
      gap:12px;
      align-items:flex-start;
      cursor:pointer;
      transition:.15s ease;
      font-size:15px;
      line-height:1.4;
    }

    .option:hover{
      transform:translateY(-1px);
      border-color:#bca98f;
      background:white;
    }

    .option.selected{
      border-color:var(--gold);
      background:var(--gold-soft);
    }

    .option.selected.classifier-selected{
      border-color:var(--accent);
      background:var(--accent-bg);
    }

    .option-num{
      width:28px;
      height:28px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--surface-2);
      color:var(--text-soft);
      font-size:13px;
      font-weight:800;
      flex-shrink:0;
      margin-top:1px;
    }

    .option.selected .option-num{
      background:var(--gold);
      color:white;
    }

    .option.selected.classifier-selected .option-num{
      background:var(--accent);
      color:white;
    }

    .meter{
      margin-top:14px;
      height:6px;
      border-radius:999px;
      background:#e8e0d4;
      overflow:hidden;
    }

    .meter-fill{
      height:100%;
      background:linear-gradient(90deg, var(--gold), #b89d7a);
      width:0%;
      transition:width .2s ease;
    }

    .notes-label{
      margin-top:14px;
      margin-bottom:6px;
      color:var(--text-faint);
      font-size:11px;
      letter-spacing:.16em;
      text-transform:uppercase;
      font-weight:700;
    }

    textarea.notes{
      width:100%;
      min-height:90px;
      resize:vertical;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fbf8f4;
      padding:13px 14px;
      font-size:15px;
      color:var(--text);
      outline:none;
      line-height:1.45;
      font-family:inherit;
    }

    .admin-box{
      display:none;
      margin-top:12px;
      border:1px dashed var(--accent);
      background:var(--accent-bg);
      border-radius:14px;
      padding:12px;
    }
    .admin-box.on{ display:block; }

    .admin-box label{
      display:block;
      font-size:11px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--accent);
      font-weight:800;
      margin-bottom:8px;
    }

    .admin-box select{
      width:100%;
      max-width:240px;
      border:1px solid #8fb3ae;
      border-radius:12px;
      background:white;
      padding:10px 12px;
      font-size:15px;
    }

    .admin-note{
      margin-top:8px;
      font-size:13px;
      color:var(--text-soft);
      line-height:1.45;
    }

    .reveal{
      width:100%;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg, var(--gold), #a88d6d);
      color:white;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      padding:17px 18px;
      font-size:13px;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .result{
      margin-top:8px;
      border-radius:24px;
      overflow:hidden;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      background:var(--surface);
    }

    .result-top{
      padding:28px 20px 24px;
      text-align:center;
    }

    .result-name{
      font-size:11px;
      letter-spacing:.28em;
      text-transform:uppercase;
      margin-bottom:10px;
      opacity:.8;
    }

    .result-grade{
      font-family: Georgia, "Times New Roman", serif;
      font-size:80px;
      line-height:.95;
      font-weight:700;
      letter-spacing:-.04em;
    }

    .result-tier{
      margin-top:8px;
      font-size:18px;
      font-weight:800;
    }

    .result-verdict{
      margin:14px auto 0;
      max-width:620px;
      font-size:15px;
      line-height:1.65;
      color:var(--text-soft);
    }

    .result-action{
      display:inline-block;
      margin-top:16px;
      padding:12px 16px;
      border-radius:14px;
      font-size:13px;
      font-weight:800;
    }

    .result-body{
      padding:18px;
      background:var(--surface);
    }

    .section-label{
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--text-faint);
      font-weight:800;
      margin-bottom:10px;
    }

    .breakdown{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:10px;
    }

    .mini{
      border:1px solid var(--line);
      background:#faf7f2;
      border-radius:16px;
      padding:12px;
    }

    .mini-title{
      font-size:12px;
      color:var(--text-soft);
      line-height:1.35;
      margin-bottom:5px;
    }

    .mini-score{
      font-size:22px;
      font-weight:800;
      color:var(--text);
    }

    .mini-score span{
      font-size:12px;
      font-weight:600;
      color:var(--text-faint);
    }

    .mini-pts{
      margin-top:3px;
      color:var(--gold);
      font-size:12px;
      font-weight:700;
    }

    .mini-note{
      margin-top:8px;
      padding-top:8px;
      border-top:1px solid #e5dccf;
      font-size:12px;
      line-height:1.45;
      color:var(--text-soft);
    }

    .result-footer{
      margin-top:14px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }

    .big-score{
      font-size:15px;
      color:var(--text-soft);
    }

    .big-score strong{
      font-size:28px;
      color:var(--text);
    }

    .reset{
      border:1px solid var(--gold);
      color:var(--gold);
      background:transparent;
      border-radius:14px;
      padding:12px 16px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      cursor:pointer;
    }

    .scale{
      margin-top:16px;
      border-top:1px solid var(--line);
      padding-top:16px;
    }

    .scale-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .scale-pill{
      min-width:66px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:8px 10px;
      background:#faf7f2;
      text-align:center;
    }

    .scale-pill.active{
      background:var(--gold-soft);
      border-color:var(--gold);
    }

    .scale-g{
      font-family: Georgia, "Times New Roman", serif;
      font-size:16px;
      font-weight:700;
    }

    .scale-r, .scale-t{
      font-size:10px;
      color:var(--text-faint);
      margin-top:2px;
    }

    @media (max-width: 640px){
      .shell{ padding:16px 12px 34px; }
      .hero{ margin:0 -12px 16px; padding:16px 12px 14px; }
      .progress-box{ width:100%; }
      .card{ padding:16px; border-radius:18px; }
      .title{ font-size:18px; }
      .option{ font-size:15px; padding:13px; }
      .breakdown{ grid-template-columns:1fr; }
      .result-grade{ font-size:62px; }
      .result-tier{ font-size:16px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div class="hero-inner">
        <div class="eyebrow">POD Network</div>
        <h1>Office Readiness Assessment</h1>
        <div class="sub">Answer based on what exists right now — not projections, not future plans.</div>

        <div class="topbar">
          <div class="name-wrap">
            <input
              id="officeName"
              class="office-input"
              type="text"
              placeholder="Your name or team name (e.g. Sarah M. — solo agent, Scottsdale)"
            />
          </div>
          <div class="progress-box">
            <div class="progress-label">Progress</div>
            <div id="progressDots" class="dots"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="routeBox" class="route"></div>
    <div id="cards"></div>
  </div>

  <script>
    const ADMIN = new URLSearchParams(window.location.search).get("admin") === "true";

    const CLASSIFIERS = [
      {
        id: "role",
        label: "What best describes your role?",
        desc: "This determines how your results are interpreted and which program tier applies to you.",
        guidance: "<strong>Select the option that describes you today</strong> — not what you're working toward.",
        options: [
          { value: "referral", label: "EXP Commercial referral agent / classified referral division" },
          { value: "solo", label: "Solo agent — independent, no team" },
          { value: "team", label: "Agent on a team" },
          { value: "leader", label: "Team leader or mega team operator" }
        ]
      },
      {
        id: "txcount",
        label: "How many transactions did you close in the last 12 months?",
        desc: "Individual or team total — whichever reflects your actual production.",
        guidance: "<strong>Real numbers from the last 12 months.</strong> If you're a team leader, include your full team's transaction count.",
        options: [
          { value: "tx1", label: "10–20 transactions" },
          { value: "tx2", label: "20–30 transactions" },
          { value: "tx3", label: "30–50 transactions" },
          { value: "tx4", label: "50–100 transactions" },
          { value: "tx5", label: "100–150 transactions" },
          { value: "tx6", label: "150–200 transactions" },
          { value: "tx7", label: "200+ transactions" }
        ]
      }
    ];

    const VARIABLES = [
      {
        id: "volume",
        label: "Team Production Volume",
        weight: 20,
        maxScore: 6,
        desc: "Total transaction volume closed in the last 12 months — team or individual, whichever is higher.",
        guidance: "<strong>Real numbers only.</strong> What did you actually close in the last 12 months? Per-agent average in field notes if known.",
        notesPrompt: "Exact volume last 12 months + per-agent average if known",
        adminReview: false,
        options: [
          "$5M – $25M total volume",
          "$25M – $50M total volume",
          "$50M – $100M total volume",
          "$100M – $150M total volume",
          "$150M – $200M total volume",
          "$200M+ total volume"
        ]
      },
      {
        id: "capicon",
        label: "Agent Cap & Icon Rate",
        weight: 15,
        maxScore: 5,
        desc: "How many agents on your team capped or iconed last year — the ratio matters more than the raw count.",
        guidance: "<strong>Think ratio, not total.</strong> 100 agents / 5 icons is very different from 50 agents / 40 icons.",
        notesPrompt: "Total agents / agents capped / agents iconed",
        adminReview: false,
        options: [
          "Less than 20% of agents capped last year",
          "20–40% capped, minimal icons",
          "40–70% capped, some icons",
          "70–90% capped, 10–25% iconed",
          "90%+ capped, 25%+ iconed — high-performing team"
        ]
      },
      {
        id: "wealth",
        label: "Geographic Proximity to Wealth",
        weight: 15,
        maxScore: 5,
        desc: "Where your office sits relative to high-net-worth residential and commercial corridors.",
        guidance: "<strong>Think drive time and demographics.</strong> How far from where wealth lives, works, and transacts?",
        notesPrompt: "Primary zip codes or neighborhoods your agents work in",
        adminReview: false,
        options: [
          "Remote — no proximate wealth concentration",
          "Adjacent to modest wealth corridors (20+ min away)",
          "Near established middle-market commercial zones",
          "Within high-wealth residential and commercial corridor",
          "Embedded in primary luxury / HNWI and commercial hub"
        ]
      },
      {
        id: "leader",
        label: "Team Leader Engagement & Commitment",
        weight: 20,
        maxScore: 5,
        desc: "The leader's demonstrated willingness to actively champion and sustain the program.",
        guidance: "<strong>Score observed behavior, not stated interest.</strong> Passive interest is not commitment.",
        notesPrompt: "Describe the team leader's current engagement with commercial initiatives",
        adminReview: false,
        options: [
          "Passive / skeptical — needs significant convincing",
          "Curious but uncommitted — watching from the sidelines",
          "Supportive — will participate but won't actively drive",
          "Committed — promotes, attends training, holds agents accountable",
          "Champion — fully bought in, co-owns the program's success"
        ]
      },
      {
        id: "bizowner",
        label: "Business Owner CRM Relationships",
        weight: 15,
        maxScore: 5,
        desc: "Relationships with business owners who make real estate decisions — single location to enterprise scale.",
        guidance: "<strong>Think right now:</strong> who in your database owns or operates a business?",
        notesPrompt: "Name the most significant business owner or enterprise decision-maker in your database",
        adminReview: true,
        adminNote: "Manual review: a named enterprise relationship may justify a score override.",
        options: [
          "Know a single small business owner — single location",
          "Know multiple small business owners — single locations",
          "Know a C-suite exec, founder, or mid-size org leader",
          "Know a multi-location operator or franchisee (5–20 locations)",
          "Know an enterprise-level decision maker — 20+ locations, corporate RE manager, regional chain"
        ]
      },
      {
        id: "investor",
        label: "Institutional Investor & Landlord Portfolio Relationships",
        weight: 10,
        maxScore: 5,
        desc: "Relationships with portfolio owners — people who own multiple properties at scale.",
        guidance: "<strong>Portfolio owners, not casual investors.</strong> Who has called you about more than one property?",
        notesPrompt: "List your top 1–5 portfolio owners or landlords by name and what they own",
        adminReview: true,
        adminNote: "Manual review: cross-reference names against known commercial portfolio holders.",
        options: [
          "No known portfolio owners or landlords in CRM",
          "A handful of casual investors — 1–2 properties each",
          "Moderate base — some multi-property owners",
          "Strong relationships — several active landlords / portfolio owners",
          "Deep network — multiple serious portfolio owners, active deal flow"
        ]
      },
      {
        id: "velocity",
        label: "Local Commercial Transaction Velocity",
        weight: 3,
        maxScore: 5,
        desc: "How active the commercial market is in this territory right now.",
        guidance: "<strong>Market conditions, not team activity.</strong> Are commercial deals happening here regardless of who is doing them?",
        notesPrompt: "Any awareness of recent commercial activity in your market?",
        adminReview: false,
        options: [
          "Very low — minimal commercial activity",
          "Low — occasional deals, mostly residential market",
          "Moderate — steady but not deep commercial deal flow",
          "Active — consistent transactions across asset classes",
          "High velocity — significant activity, multiple asset classes"
        ]
      },
      {
        id: "access",
        label: "Market Territory Accessibility",
        weight: 2,
        maxScore: 5,
        desc: "Physical accessibility of the office and territory to commercial clients.",
        guidance: "<strong>Think client friction.</strong> Would a commercial client find it easy to meet here?",
        notesPrompt: "Any geographic limitations worth noting?",
        adminReview: false,
        options: [
          "Difficult access — isolated geography, limited client traffic",
          "Somewhat accessible but off main commercial corridors",
          "Reasonably accessible — clients can reach the office",
          "Well-positioned — near transit, freeways, commercial centers",
          "Prime location — high visibility, easy access, strong commercial flow"
        ]
      }
    ];

    const GRADE_SCALE = [
      { g:"A+", range:"92–100", tier:"Tier 3" },
      { g:"A", range:"85–91", tier:"Tier 3" },
      { g:"A−", range:"78–84", tier:"T2→T3" },
      { g:"B+", range:"72–77", tier:"Tier 2" },
      { g:"B", range:"65–71", tier:"Tier 2" },
      { g:"B−", range:"58–64", tier:"T1→T2" },
      { g:"C+", range:"50–57", tier:"Tier 1" },
      { g:"C", range:"<50", tier:"Tier 1" }
    ];

    const ROUTING = {
      referral: {
        cls: "referral",
        text: "<strong>Referral Agent Route:</strong> Your results reflect Tier 1 referral eligibility only."
      },
      solo: {
        cls: "solo",
        text: "<strong>Solo Agent Route:</strong> Strong scores may support a referral upward to a team leader for Tier 2 discussion."
      },
      team: {
        cls: "team",
        text: "<strong>Team Agent Route:</strong> Your individual profile is being evaluated. Higher tiers still require team leader activation."
      },
      leader: {
        cls: "leader",
        text: "<strong>Team Leader Route:</strong> Full tier evaluation. All three tiers are in play."
      }
    };

    const state = {
      classifierAnswers: {},
      scores: {},
      notes: {},
      overrides: {},
      revealed: false
    };

    function getRole(){
      return state.classifierAnswers.role || null;
    }

    function calcScore(){
      return VARIABLES.reduce((acc, v) => {
        const raw = state.scores[v.id];
        if (!raw) return acc;
        const effective = state.overrides[v.id] || raw;
        return acc + (effective / v.maxScore) * v.weight;
      }, 0);
    }

    function getResult(score, role){
      if (role === "referral") {
        return {
          grade:"T1",
          tier:"Tier 1 — Referral Program",
          color:"#7A4F2E",
          bg:"#F5EAE0",
          verdict:"As an EXP Commercial referral agent, Tier 1 is your lane. Submit commercial signals and earn referral fees when deals close.",
          action:"Enroll in Tier 1 Referral Program",
          actionBg:"#F5EAE0",
          actionColor:"#7A4F2E"
        };
      }

      if (role === "solo") {
        if (score >= 72) return {
          grade: score >= 85 ? "A" : score >= 78 ? "A−" : "B+",
          tier:"Tier 1 Now → Refer to Team Leader",
          color:"#3D5A6B",
          bg:"#E5EDF2",
          verdict:"Your individual profile is strong. You qualify for Tier 1 now, and your score may justify a Tier 2 conversation with a team leader.",
          action:"Enroll in Tier 1 · Share with your team leader",
          actionBg:"#E5EDF2",
          actionColor:"#3D5A6B"
        };

        if (score >= 58) return {
          grade: score >= 65 ? "B" : "B−",
          tier:"Tier 1 — Referral Program",
          color:"#7A4F2E",
          bg:"#F5EAE0",
          verdict:"You qualify for Tier 1 participation today. Build relationship depth and revisit expansion later.",
          action:"Enroll in Tier 1 Referral Program",
          actionBg:"#F5EAE0",
          actionColor:"#7A4F2E"
        };

        return {
          grade:"C+",
          tier:"Tier 1 — Referral Only",
          color:"#6B3328",
          bg:"#F5E8E6",
          verdict:"Tier 1 is your entry point. Build signal habits and stronger CRM depth first.",
          action:"Begin Tier 1 signal submission",
          actionBg:"#F5E8E6",
          actionColor:"#6B3328"
        };
      }

      if (role === "team") {
        if (score >= 78) return {
          grade: score >= 92 ? "A+" : score >= 85 ? "A" : "A−",
          tier:"Strong Tier 2 Candidate — Team Leader Must Activate",
          color:"#4A6741",
          bg:"#E8EFE7",
          verdict:"Your score is strong enough to justify a serious Tier 2 conversation, but your team leader still has to activate it.",
          action:"Share with team leader — request Tier 2 activation",
          actionBg:"#E8EFE7",
          actionColor:"#4A6741"
        };

        if (score >= 58) return {
          grade: score >= 72 ? "B+" : score >= 65 ? "B" : "B−",
          tier:"Tier 1 Now · Tier 2 via Team Leader",
          color:"#3D5A6B",
          bg:"#E5EDF2",
          verdict:"You qualify for Tier 1 now. Tier 2 depends on team leader commitment.",
          action:"Enroll in Tier 1 · Begin team leader conversation",
          actionBg:"#E5EDF2",
          actionColor:"#3D5A6B"
        };

        return {
          grade:"C+",
          tier:"Tier 1 — Referral Only",
          color:"#6B3328",
          bg:"#F5E8E6",
          verdict:"Tier 1 is the starting point. Build more relationship depth before pushing higher.",
          action:"Begin Tier 1 signal submission",
          actionBg:"#F5E8E6",
          actionColor:"#6B3328"
        };
      }

      if (score >= 92) return {
        grade:"A+",
        tier:"Tier 3 — Full Build",
        color:"#4A6741",
        bg:"#E8EFE7",
        verdict:"All systems green. Move straight into Tier 3 build.",
        action:"Proceed to Tier 3 — Schedule build session",
        actionBg:"#E8EFE7",
        actionColor:"#4A6741"
      };

      if (score >= 85) return {
        grade:"A",
        tier:"Tier 3 — Full Build",
        color:"#4A6741",
        bg:"#E8EFE7",
        verdict:"Strong profile with only minor gaps. Tier 3 is the right move.",
        action:"Proceed to Tier 3",
        actionBg:"#E8EFE7",
        actionColor:"#4A6741"
      };

      if (score >= 78) return {
        grade:"A−",
        tier:"Tier 2 → Tier 3 Path",
        color:"#4A6741",
        bg:"#E8EFE7",
        verdict:"Start in Tier 2, prove the model, then move to Tier 3.",
        action:"Begin Tier 2 MSA process",
        actionBg:"#E8EFE7",
        actionColor:"#4A6741"
      };

      if (score >= 72) return {
        grade:"B+",
        tier:"Tier 2 — Embedded Unit",
        color:"#3D5A6B",
        bg:"#E5EDF2",
        verdict:"Ready for an embedded commercial presence.",
        action:"Begin Tier 2 MSA process",
        actionBg:"#E5EDF2",
        actionColor:"#3D5A6B"
      };

      if (score >= 65) return {
        grade:"B",
        tier:"Tier 2 — Embedded Unit",
        color:"#3D5A6B",
        bg:"#E5EDF2",
        verdict:"Tier 2 is viable, but fix the weak spots before pretending this is premium-ready.",
        action:"Review gaps · Begin Tier 2 conversation",
        actionBg:"#E5EDF2",
        actionColor:"#3D5A6B"
      };

      if (score >= 58) return {
        grade:"B−",
        tier:"Tier 1 → Tier 2 Watch",
        color:"#7A4F2E",
        bg:"#F5EAE0",
        verdict:"Referral bolt-on now. Reassess later.",
        action:"Enroll in Tier 1 · Set reassessment",
        actionBg:"#F5EAE0",
        actionColor:"#7A4F2E"
      };

      if (score >= 50) return {
        grade:"C+",
        tier:"Tier 1 — Referral Only",
        color:"#6B3328",
        bg:"#F5E8E6",
        verdict:"Tier 1 only for now. Too many constraints for embedded participation.",
        action:"Enroll in Tier 1 Referral Program",
        actionBg:"#F5E8E6",
        actionColor:"#6B3328"
      };

      return {
        grade:"C",
        tier:"Tier 1 — Minimal",
        color:"#6B3328",
        bg:"#F5E8E6",
        verdict:"Too many weak points. Tier 1 only, with modest expectations.",
        action:"Tier 1 only — revisit later",
        actionBg:"#F5E8E6",
        actionColor:"#6B3328"
      };
    }

    function updateProgress(){
      const el = document.getElementById("progressDots");
      const answeredClassifiers = Object.keys(state.classifierAnswers).length;
      const answeredScores = Object.keys(state.scores).length;
      const total = CLASSIFIERS.length + VARIABLES.length;

      const dotsHtml =
        CLASSIFIERS.map(c => `<div class="dot classifier${state.classifierAnswers[c.id] ? ' filled' : ''}"></div>`).join("") +
        VARIABLES.map(v => `<div class="dot${state.scores[v.id] ? ' filled' : ''}"></div>`).join("") +
        `<span class="dot-count">${answeredClassifiers + answeredScores}/${total}</span>`;

      el.innerHTML = dotsHtml;
    }

    function updateRoute(){
      const role = getRole();
      const box = document.getElementById("routeBox");
      if (!role) {
        box.className = "route";
        box.innerHTML = "";
        return;
      }
      box.className = `route show ${ROUTING[role].cls}`;
      box.innerHTML = ROUTING[role].text;
    }

    function buildCardHeader(questionNumber, title, desc, scoreDisplay, isClassifier, weightText){
      return `
        <div class="card-head">
          <div>
            <div class="title">
              <span class="q-badge ${isClassifier ? 'classifier' : ''}">Q${questionNumber}</span>
              ${title}
              ${weightText ? `<span class="weight">${weightText}</span>` : ""}
            </div>
            <div class="desc">${desc}</div>
          </div>
          ${scoreDisplay ? `<div class="score-pill ${isClassifier ? 'acc' : ''}">${scoreDisplay}</div>` : ""}
        </div>
      `;
    }

    function buildClassifierCard(item, index){
      const selected = state.classifierAnswers[item.id] || "";
      const card = document.createElement("div");
      card.className = "card classifier-card";

      const options = item.options.map((opt, i) => `
        <button class="option ${selected === opt.value ? 'selected classifier-selected' : ''}" data-type="classifier" data-id="${item.id}" data-value="${opt.value}">
          <span class="option-num">${i + 1}</span>
          <span>${opt.label}</span>
        </button>
      `).join("");

      card.innerHTML = `
        ${buildCardHeader(index + 1, item.label, item.desc, selected ? "✓" : "", true, "")}
        <div class="guide">${item.guidance}</div>
        <div class="options">${options}</div>
      `;
      return card;
    }

    function buildVariableCard(item, index){
      const selected = state.scores[item.id] || 0;
      const effective = state.overrides[item.id] || selected || "";
      const pct = selected ? (selected / item.maxScore) * 100 : 0;
      const card = document.createElement("div");
      card.className = "card";

      const options = item.options.map((opt, i) => `
        <button class="option ${selected === i + 1 ? 'selected' : ''}" data-type="score" data-id="${item.id}" data-value="${i + 1}">
          <span class="option-num">${i + 1}</span>
          <span>${opt}</span>
        </button>
      `).join("");

      const adminHtml = item.adminReview ? `
        <div class="admin-box ${ADMIN ? 'on' : ''}">
          <label>Admin — Manual Score Override</label>
          <select data-type="override" data-id="${item.id}">
            <option value="">Use auto-score</option>
            ${[1,2,3,4,5].map(n => `<option value="${n}" ${state.overrides[item.id] === n ? 'selected' : ''}>Override: ${n}</option>`).join("")}
          </select>
          <div class="admin-note">${item.adminNote || ""}</div>
        </div>
      ` : "";

      card.innerHTML = `
        ${buildCardHeader(CLASSIFIERS.length + index + 1, item.label, item.desc, effective, false, `${item.weight}% weight`)}
        <div class="guide">${item.guidance}</div>
        <div class="options">${options}</div>
        <div class="meter"><div class="meter-fill" style="width:${pct}%"></div></div>
        <div class="notes-label">Field Notes</div>
        <textarea class="notes" data-type="note" data-id="${item.id}" placeholder="${item.notesPrompt}">${state.notes[item.id] || ""}</textarea>
        ${adminHtml}
      `;
      return card;
    }

    function renderResult(container){
      const score = calcScore();
      const role = getRole();
      const result = getResult(score, role);
      const txVal = state.classifierAnswers.txcount || "";
      const txLabel = (CLASSIFIERS[1].options.find(o => o.value === txVal) || {}).label || "";
      const name = document.getElementById("officeName").value.trim() || "Assessment Result";

      const resultEl = document.createElement("div");
      resultEl.className = "result";

      const cards = VARIABLES.map(v => {
        const raw = state.scores[v.id];
        if (!raw) return "";
        const eff = state.overrides[v.id] || raw;
        const contrib = ((eff / v.maxScore) * v.weight).toFixed(1);
        const note = state.notes[v.id] ? `<div class="mini-note">${escapeHtml(state.notes[v.id])}</div>` : "";
        return `
          <div class="mini">
            <div class="mini-title">${v.label}</div>
            <div class="mini-score">${eff}<span>/${v.maxScore}</span></div>
            <div class="mini-pts">+${contrib} pts</div>
            ${note}
          </div>
        `;
      }).join("");

      resultEl.innerHTML = `
        <div class="result-top" style="background:${result.bg}; color:${result.color}">
          <div class="result-name">${escapeHtml(name)}</div>
          <div class="result-grade">${result.grade}</div>
          <div class="result-tier">${result.tier}</div>
          <div class="result-verdict">${result.verdict}</div>
          <div class="result-action" style="background:${result.actionBg}; color:${result.actionColor}">→ ${result.action}</div>
          ${txLabel ? `<div style="margin-top:12px;font-size:12px;opacity:.75;">Transaction volume: ${txLabel}</div>` : ""}
        </div>

        <div class="result-body">
          <div class="section-label">Score Breakdown</div>
          <div class="breakdown">${cards}</div>

          <div class="result-footer">
            <div class="big-score">Score: <strong>${score.toFixed(1)}</strong> / 100</div>
            <button class="reset" id="resetBtn">New Assessment</button>
          </div>

          <div class="scale">
            <div class="section-label">Grade Scale</div>
            <div class="scale-row">
              ${GRADE_SCALE.map(item => `
                <div class="scale-pill ${item.g === result.grade ? 'active' : ''}">
                  <div class="scale-g">${item.g}</div>
                  <div class="scale-r">${item.range}</div>
                  <div class="scale-t">${item.tier}</div>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      `;

      container.appendChild(resultEl);
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function render(){
      updateProgress();
      updateRoute();

      const cards = document.getElementById("cards");
      cards.innerHTML = "";

      CLASSIFIERS.forEach((item, idx) => cards.appendChild(buildClassifierCard(item, idx)));
      VARIABLES.forEach((item, idx) => cards.appendChild(buildVariableCard(item, idx)));

      const allAnswered =
        Object.keys(state.classifierAnswers).length === CLASSIFIERS.length &&
        Object.keys(state.scores).length === VARIABLES.length;

      if (allAnswered) {
        if (!state.revealed) {
          const btn = document.createElement("button");
          btn.className = "reveal";
          btn.textContent = "Reveal Assessment Result";
          btn.addEventListener("click", () => {
            state.revealed = true;
            render();
          });
          cards.appendChild(btn);
        } else {
          renderResult(cards);
        }
      }

      wireEvents();
    }

    function wireEvents(){
      document.querySelectorAll('[data-type="classifier"]').forEach(btn => {
        btn.addEventListener("click", () => {
          state.classifierAnswers[btn.dataset.id] = btn.dataset.value;
          state.revealed = false;
          render();
        });
      });

      document.querySelectorAll('[data-type="score"]').forEach(btn => {
        btn.addEventListener("click", () => {
          state.scores[btn.dataset.id] = Number(btn.dataset.value);
          state.revealed = false;
          render();
        });
      });

      document.querySelectorAll('[data-type="note"]').forEach(input => {
        input.addEventListener("input", () => {
          state.notes[input.dataset.id] = input.value;
        });
      });

      document.querySelectorAll('[data-type="override"]').forEach(select => {
        select.addEventListener("change", () => {
          const value = select.value ? Number(select.value) : null;
          state.overrides[select.dataset.id] = value;
          state.revealed = false;
          render();
        });
      });

      const resetBtn = document.getElementById("resetBtn");
      if (resetBtn) {
        resetBtn.addEventListener("click", () => {
          state.classifierAnswers = {};
          state.scores = {};
          state.notes = {};
          state.overrides = {};
          state.revealed = false;
          document.getElementById("officeName").value = "";
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      }
    }

    render();
  </script>
</body>
</html>
